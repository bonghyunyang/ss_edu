<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 실적 대시보드</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --text:#e2e8f0; --muted:#94a3b8; --line:#334155;
    --up:#34d399; --down:#f87171; --flat:#fbbf24; --accent:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--text);padding:32px 20px;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto}
  header{margin-bottom:28px}
  h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:14px;margin-top:6px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .kpi .label{color:var(--muted);font-size:13px}
  .kpi .val{font-size:28px;font-weight:800;margin-top:6px}
  .kpi .delta{font-size:13px;margin-top:4px;font-weight:600}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:#cbd5e1}
  .bar-row{margin-bottom:16px}
  .bar-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .bar-head .store{font-weight:700}
  .bar-track{background:var(--card2);border-radius:8px;height:26px;position:relative;overflow:hidden}
  .bar-prev{position:absolute;top:0;left:0;height:100%;background:#3b4a63;border-radius:8px}
  .bar-cur{position:absolute;top:0;left:0;height:100%;border-radius:8px}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:4px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.store{font-weight:700}
  .note{color:var(--muted);font-size:12.5px;text-align:left}
  .pill{font-weight:700;padding:2px 8px;border-radius:20px;font-size:12px;display:inline-block}
  footer{color:var(--muted);font-size:12px;margin-top:24px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 주간 실적 공유 대시보드</h1>
    <div class="sub">매장별 주간매출 비교 · 단위: 백만 원</div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card">
      <h2>매장별 매출 (금주 vs 전주)</h2>
      <div id="bars"></div>
      <div class="legend">
        <span><span class="dot" style="background:var(--accent)"></span>금주</span>
        <span><span class="dot" style="background:#3b4a63"></span>전주</span>
      </div>
    </div>

    <div class="card">
      <h2>매장별 증감률 순위</h2>
      <div id="rank"></div>
    </div>
  </div>

  <div class="card" style="margin-top:18px">
    <h2>상세 실적 &amp; 특이사항</h2>
    <table id="tbl">
      <thead><tr>
        <th>매장</th><th>금주</th><th>전주</th><th>증감</th><th>증감률</th><th class="note">특이사항</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <footer>출처: 매장별_주간실적.csv · 자동 생성 대시보드</footer>
</div>

<script>
const data = [
  {store:"강남", cur:412, prev:380, note:"비스포크 냉장고 프로모션 효과"},
  {store:"분당", cur:268, prev:290, note:"주말 방문객 감소"},
  {store:"판교", cur:305, prev:305, note:"모바일 신제품 개통 증가"},
  {store:"일산", cur:198, prev:230, note:"에어컨 설치 지연 클레임 3건"},
  {store:"수원", cur:351, prev:318, note:"체험존 리뉴얼 후 객단가 상승"},
];

const fmt = n => n.toLocaleString("ko-KR");
const color = d => d>0?"var(--up)":d<0?"var(--down)":"var(--flat)";
const sign = d => d>0?"▲ +":d<0?"▼ ":"—  ";
const rate = d => ((d.cur-d.prev)/d.prev*100);

const totalCur = data.reduce((s,d)=>s+d.cur,0);
const totalPrev = data.reduce((s,d)=>s+d.prev,0);
const totalDelta = totalCur-totalPrev;
const totalRate = totalDelta/totalPrev*100;
const best = [...data].sort((a,b)=>rate(b)-rate(a))[0];
const worst = [...data].sort((a,b)=>rate(a)-rate(b))[0];

// KPIs
document.getElementById("kpis").innerHTML = [
  {label:"전체 금주매출", val:fmt(totalCur), delta:`전주 ${fmt(totalPrev)}`, c:"var(--muted)"},
  {label:"전주 대비 증감", val:(totalDelta>0?"+":"")+fmt(totalDelta),
     delta:(totalRate>0?"▲ +":"▼ ")+totalRate.toFixed(1)+"%", c:color(totalDelta)},
  {label:"최고 성장 매장", val:best.store, delta:"▲ +"+rate(best).toFixed(1)+"%", c:"var(--up)"},
  {label:"주의 매장", val:worst.store, delta:"▼ "+rate(worst).toFixed(1)+"%", c:"var(--down)"},
].map(k=>`<div class="kpi"><div class="label">${k.label}</div>
   <div class="val">${k.val}</div>
   <div class="delta" style="color:${k.c}">${k.delta}</div></div>`).join("");

// Bars
const maxV = Math.max(...data.map(d=>Math.max(d.cur,d.prev)));
document.getElementById("bars").innerHTML = data.map(d=>{
  const dl = d.cur-d.prev;
  return `<div class="bar-row">
    <div class="bar-head"><span class="store">${d.store}</span>
      <span>${fmt(d.cur)} <span style="color:${color(dl)}">(${sign(dl)}${Math.abs(dl)})</span></span></div>
    <div class="bar-track">
      <div class="bar-prev" style="width:${d.prev/maxV*100}%"></div>
      <div class="bar-cur" style="width:${d.cur/maxV*100}%;background:var(--accent);opacity:.92"></div>
    </div></div>`;
}).join("");

// Rank
document.getElementById("rank").innerHTML = [...data].sort((a,b)=>rate(b)-rate(a)).map((d,i)=>{
  const r = rate(d);
  return `<div style="display:flex;align-items:center;justify-content:space-between;
      padding:10px 0;border-bottom:1px solid var(--line)">
    <span><b style="color:var(--muted)">${i+1}</b>&nbsp;&nbsp;<b>${d.store}</b></span>
    <span class="pill" style="background:${color(d.cur-d.prev)}22;color:${color(d.cur-d.prev)}">
      ${r>0?"+":""}${r.toFixed(1)}%</span></div>`;
}).join("");

// Table
document.querySelector("#tbl tbody").innerHTML = data.map(d=>{
  const dl=d.cur-d.prev, r=rate(d);
  return `<tr><td class="store">${d.store}</td><td>${fmt(d.cur)}</td><td>${fmt(d.prev)}</td>
    <td style="color:${color(dl)}">${dl>0?"+":""}${fmt(dl)}</td>
    <td style="color:${color(dl)}">${r>0?"+":""}${r.toFixed(1)}%</td>
    <td class="note">${d.note}</td></tr>`;
}).join("") +
  `<tr style="border-top:2px solid var(--line)"><td class="store">합계</td>
   <td><b>${fmt(totalCur)}</b></td><td>${fmt(totalPrev)}</td>
   <td style="color:${color(totalDelta)}">${totalDelta>0?"+":""}${fmt(totalDelta)}</td>
   <td style="color:${color(totalDelta)}">${totalRate>0?"+":""}${totalRate.toFixed(1)}%</td><td></td></tr>`;
</script>
</body>
</html>
