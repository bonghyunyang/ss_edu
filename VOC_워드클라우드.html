<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객 VOC 워드클라우드</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
    --line:#334155; --accent:#60a5fa; --hi:#fbbf24;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--text);padding:32px 20px;line-height:1.6}
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:14px;margin:6px 0 22px}
  .cloud{position:relative;background:var(--card);border:1px solid var(--line);
    border-radius:16px;height:380px;overflow:hidden}
  .word{position:absolute;cursor:pointer;font-weight:800;white-space:nowrap;
    transform:translate(-50%,-50%);transition:color .15s,text-shadow .15s;
    user-select:none}
  .word:hover{text-shadow:0 0 18px currentColor}
  .word.active{color:var(--hi)!important;text-shadow:0 0 20px var(--hi)}
  .panel{margin-top:18px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:20px;min-height:70px}
  .panel h2{font-size:15px;font-weight:700;margin-bottom:12px}
  .panel h2 b{color:var(--hi)}
  .hint{color:var(--muted);font-size:14px}
  .voc{padding:11px 14px;border-left:3px solid var(--accent);
    background:#27344977;border-radius:8px;margin-bottom:10px;font-size:14.5px}
  .voc .no{color:var(--muted);font-size:12px;margin-right:8px}
  mark{background:var(--hi);color:#1f2937;padding:0 2px;border-radius:3px;font-weight:700}
  footer{color:var(--muted);font-size:12px;margin-top:22px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>☁️ 고객 VOC 워드클라우드</h1>
  <div class="sub">자주 나온 단어일수록 크게 표시됩니다 · 단어를 클릭하면 원문이 펼쳐집니다</div>

  <div class="cloud" id="cloud"></div>

  <div class="panel" id="panel">
    <div class="hint">👆 위에서 단어를 클릭하면 해당 단어가 포함된 VOC 원문이 여기에 표시됩니다.</div>
  </div>

  <footer>출처: 고객VOC.csv · 외부 라이브러리 없이 자체 구현</footer>
</div>

<script>
// ---- VOC 원문 데이터 (CSV의 접수내용) ----
const VOC = [

  {no:7, text:"일산점 냉장고 설치 기사님이 약속 시간보다 두 시간 늦게 도착함."},
  {no:8, text:"수원점 직원이 제품 설명을 너무 빨리 해서 이해하기 어려웠음."},

  {no:10, text:"강남점에서 산 TV 화면에 세로줄이 생겼는데 A/S 접수 방법을 알려주세요."},
  {no:11, text:"세탁기 배수 호스에서 물이 새서 바닥이 젖었음. 빠른 점검 요청."},
  {no:12, text:"모바일 신제품 사전예약 혜택이 매장마다 다른 이유가 궁금함."},
  {no:13, text:"분당점 주차가 너무 복잡해서 방문이 불편했음."},
  {no:14, text:"에어컨 설치 후 실외기 소음이 심해 잠을 못 잘 정도임."},
  {no:15, text:"비스포크 냉장고 제빙기에서 얼음이 안 나옵니다."},
  {no:16, text:"판교점 직원이 보상판매 진행을 매우 꼼꼼하게 도와줘서 만족."},
  {no:17, text:"건조기 필터 청소 방법을 설명서로는 모르겠어서 문의함."},
  {no:18, text:"수원점 체험존에서 본 청소기 흡입력이 좋아 바로 구매했음."},
  {no:19, text:"일산점 에어컨 설치 일정이 계속 미뤄져 클레임 제기."},
  {no:20, text:"멤버십 포인트가 결제할 때 적립되지 않았습니다."},
  {no:21, text:"강남점에서 구매한 스마트폰 액정 보호필름 부착 서비스가 미흡했음."},
  {no:22, text:"냉장고 도어 정렬이 맞지 않아 문이 잘 안 닫힘."},
  {no:23, text:"온라인 가격이 매장 가격보다 싸서 차액 보상이 되는지 문의."},
  {no:24, text:"분당점 직원 응대가 불친절했다는 불만 접수."},
  {no:25, text:"세탁기 통세척 코스 사용법을 알려주세요."},
  {no:26, text:"비스포크 인덕션 화구 하나가 작동하지 않습니다."},
  {no:27, text:"판교점에서 모바일 기기변경 후 데이터 이전이 안 됐다는 항의."},
  {no:28, text:"에어컨 청소 서비스 비용이 얼마인지 궁금합니다."},
  {no:29, text:"TV 리모컨이 처음부터 작동하지 않아 교환 요청."},
  {no:30, text:"수원점 매장이 깔끔하게 정리되어 있어 쇼핑이 편했음."},
  {no:31, text:"건조기에서 타는 냄새가 나서 사용을 중단했습니다."},
  {no:32, text:"보상판매로 반납한 기기 평가 금액이 너무 낮게 책정됨."},
  {no:33, text:"강남점 직원이 필요 없는 제품까지 권유해서 부담스러웠음."},
  {no:34, text:"냉장고 정전 후 작동이 멈췄는데 어떻게 해야 하나요?"},
  {no:35, text:"일산점 배송 기사님이 친절하게 설치까지 도와주셔서 감사함."},
  {no:36, text:"모바일 요금제 안내가 가입할 때 들은 내용과 달라서 항의."},
  {no:37, text:"에어컨 필터 청소 후에도 냄새가 계속 납니다."},
  {no:38, text:"판교점 세탁기 전시 제품 할인 여부를 문의함."},
  {no:39, text:"비스포크 식기세척기 소음이 생각보다 커서 실망했음."},
  {no:40, text:"수원점에서 구매한 청소기 배터리가 금방 방전됨."},
  {no:41, text:"분당점 A/S 접수 후 일주일째 연락이 없어 답답함."},
  {no:42, text:"냉장고 내부 LED 조명이 깜빡거립니다."},
  {no:43, text:"강남점 프로모션 사은품을 받지 못했다는 문의."},
  {no:44, text:"TV 사운드바 연결이 안 되어 설정 도움을 요청함."},
  {no:45, text:"일산점 직원이 설치 일정을 친절하게 조율해 줘서 만족."},
  {no:46, text:"세탁기 구매 시 안내받은 무료 설치가 유료로 청구되었음."},
  {no:47, text:"모바일 보상판매 진행 절차가 너무 복잡하다는 불만."},
  {no:48, text:"판교점 에어컨 재고가 없어 한참 기다려야 한다고 안내받음."},
  {no:49, text:"비스포크 냉장고 정기 점검 서비스 신청 방법을 알고 싶음."},
  {no:50, text:"수원점 직원의 제품 비교 설명이 매우 도움이 되었음."},
];

// ---- 조사/어미 (긴 것부터 제거) ----
const PARTICLES = ["에서는","에서도","으로는","이라는","에게서","께서는",
  "에서","에게","으로","이라며","라며","다며","이라고","라고","처럼","보다",
  "까지","부터","마다","조차","이나","나마","한테","께서","이며","으로는",
  "은","는","이","가","을","를","의","에","와","과","로","도","만","랑","과는",
  "께","요","님","들"];

// ---- 불용어 ----
const STOP = new Set(["산","된","및","수","것","좀","더","또","그","저","이런",
  "저런","하는","했다","한다","합니다","입니다","있는","없는","언제","되는지",
  "싶은데","싶음","알고","하고","너무","계속","바로","처음","한참","매우",
  "금방","후에","빨리","해서","되어","않아","않습니다","않았습니다"]);

function stripParticle(w){
  for(const p of PARTICLES){
    if(w.length > p.length && w.endsWith(p)) return w.slice(0, w.length-p.length);
  }
  return w;
}

// ---- 토크나이즈 & 카운트 ----
const counts = {};      // stem -> count
const inLines = {};     // stem -> Set(voc index)
VOC.forEach((v,idx)=>{
  // 한글/영문/숫자 덩어리 추출
  const tokens = v.text.match(/[가-힣]+|[A-Za-z]+/g) || [];
  tokens.forEach(tok=>{
    let w = /[가-힣]/.test(tok) ? stripParticle(tok) : tok;
    if(w.length < 2) return;
    if(STOP.has(w)) return;
    counts[w] = (counts[w]||0)+1;
    (inLines[w] = inLines[w] || new Set()).add(idx);
  });
});

// 빈도 동률이 많으므로, 등장 문서수도 가중치로 반영
const words = Object.keys(counts).map(w=>({
  word:w, count:counts[w], docs:inLines[w].size
})).sort((a,b)=> (b.count-a.count) || (b.docs-a.docs) || (b.word.length-a.word.length));

// ---- 크기 매핑 ----
const maxC = Math.max(...words.map(w=>w.count));
const minC = Math.min(...words.map(w=>w.count));
const SIZE_MIN=15, SIZE_MAX=46;
const sizeOf = c => maxC===minC ? 26 : SIZE_MIN + (c-minC)/(maxC-minC)*(SIZE_MAX-SIZE_MIN);
const PALETTE=["#60a5fa","#34d399","#f472b6","#fbbf24","#a78bfa","#38bdf8","#fb923c","#4ade80"];

// ---- 충돌 회피 나선형 배치 ----
const cloud = document.getElementById("cloud");
function layout(){
  cloud.querySelectorAll(".word").forEach(e=>e.remove());
  const W = cloud.clientWidth, H = cloud.clientHeight;
  const cx = W/2, cy = H/2;
  const placed = []; // {x,y,w,h}
  const overlap=(a,b)=> !(a.x+a.w/2 < b.x-b.w/2 || a.x-a.w/2 > b.x+b.w/2 ||
                          a.y+a.h/2 < b.y-b.h/2 || a.y-a.h/2 > b.y+b.h/2);

  words.forEach((item,i)=>{
    const el = document.createElement("div");
    el.className="word";
    el.textContent=item.word;
    el.style.fontSize=sizeOf(item.count)+"px";
    el.style.color=PALETTE[i%PALETTE.length];
    el.title=`${item.word} · ${item.count}회`;
    cloud.appendChild(el);
    const bw = el.offsetWidth+10, bh = el.offsetHeight+6;

    // 아르키메데스 나선
    let placedOK=false;
    for(let t=0; t<2200; t+=1){
      const ang=0.32*t, rad=4*t*0.55;
      const x=cx+rad*Math.cos(ang), y=cy+rad*Math.sin(ang)*0.62;
      if(x-bw/2<2||x+bw/2>W-2||y-bh/2<2||y+bh/2>H-2) continue;
      const box={x,y,w:bw,h:bh};
      if(placed.some(p=>overlap(box,p))) continue;
      el.style.left=x+"px"; el.style.top=y+"px";
      placed.push(box); placedOK=true; break;
    }
    if(!placedOK){ el.style.left=cx+"px"; el.style.top=cy+"px"; }

    el.addEventListener("click",()=>show(item.word, el));
  });
}

// ---- 클릭 → 원문 펼침 ----
const panel=document.getElementById("panel");
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function show(word, el){
  document.querySelectorAll(".word.active").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  const idxs=[...(inLines[word]||[])].sort((a,b)=>a-b);
  const re=new RegExp("("+word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[가-힣]*)","g");
  const items=idxs.map(i=>{
    const v=VOC[i];
    const html=escapeHtml(v.text).replace(re,"<mark>$1</mark>");
    return `<div class="voc"><span class="no">#${v.no}</span>${html}</div>`;
  }).join("");
  panel.innerHTML=`<h2>“<b>${escapeHtml(word)}</b>” 포함 VOC · ${idxs.length}건 (${counts[word]}회 등장)</h2>${items}`;
}

layout();
window.addEventListener("resize",()=>{ layout(); });
</script>
</body>
</html>
